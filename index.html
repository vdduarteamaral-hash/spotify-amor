<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nós dois ❤️</title>

<style>
body{
    margin:0;
    background:#121212;
    font-family:Arial, sans-serif;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    width:360px;
    background:#181818;
    border-radius:20px;
    padding:20px;
    text-align:center;
    box-shadow:0 0 30px rgba(0,0,0,0.6);
}

.cover{
    width:100%;
    border-radius:15px;
}

h2{
    margin:15px 0 5px 0;
}

.artist{
    color:#b3b3b3;
    margin-bottom:15px;
}

audio{
    width:100%;
    margin-bottom:25px;
}

.timer{
    display:flex;
    justify-content:space-between;
    gap:5px;
}

.box{
    background:#000;
    padding:10px;
    border-radius:10px;
    width:60px;
}

.number{
    font-size:18px;
    font-weight:bold;
}

.label{
    font-size:10px;
    color:#b3b3b3;
    margin-bottom:5px;
}
</style>
</head>
<body>

<div class="container">

    <img src="foto.jpg" class="cover">

    <h2>Iris</h2>
    <div class="artist">Goo Goo Dolls</div>

    <audio controls autoplay loop>
        <source src="iris.mp3" type="audio/mpeg">
    </audio>

    <div class="timer">
        <div class="box">
            <div class="label">ANOS</div>
            <div class="number" id="years">0</div>
        </div>

        <div class="box">
            <div class="label">DIAS</div>
            <div class="number" id="days">0</div>
        </div>

        <div class="box">
            <div class="label">HORAS</div>
            <div class="number" id="hours">0</div>
        </div>

        <div class="box">
            <div class="label">MIN</div>
            <div class="number" id="minutes">0</div>
        </div>

        <div class="box">
            <div class="label">SEG</div>
            <div class="number" id="seconds">0</div>
        </div>
    </div>

</div>

<script>
const startDate = new Date("2025-08-23T00:00:00");

function updateTimer(){
    const now = new Date();
    let diff = now - startDate;

    const seconds = Math.floor(diff / 1000) % 60;
    const minutes = Math.floor(diff / (1000 * 60)) % 60;
    const hours = Math.floor(diff / (1000 * 60 * 60)) % 24;
    const daysTotal = Math.floor(diff / (1000 * 60 * 60 * 24));
    const years = Math.floor(daysTotal / 365);
    const days = daysTotal % 365;

    document.getElementById("years").textContent = years;
    document.getElementById("days").textContent = days;
    document.getElementById("hours").textContent = hours;
    document.getElementById("minutes").textContent = minutes;
    document.getElementById("seconds").textContent = seconds;
}

setInterval(updateTimer,1000);
updateTimer();
</script>

</body>
</html>
